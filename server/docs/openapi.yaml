openapi: 3.0.3
info:
  title: HanMemo API
  description: >
    REST API for HanMemo — a Mandarin Chinese spaced repetition vocabulary
    learning app for Cambodian (Khmer-speaking) learners. Covers HSK 1–2
    vocabulary, lessons, SM-2 based review scheduling, progress tracking,
    and admin content management.
  version: 1.0.0
  contact:
    name: Chan Veasna
    url: https://hanmemo-production.up.railway.app
servers:
  - url: https://hanmemo-production.up.railway.app/api
    description: Production (Railway)
  - url: http://localhost:5000/api
    description: Local development

tags:
  - name: Auth
    description: Registration and login
  - name: Lessons
    description: Lesson browsing and completion
  - name: Vocabulary
    description: Single vocabulary word lookups
  - name: Reviews
    description: SRS review queue and rating (SM-2)
  - name: Progress
    description: User stats, streaks, retention
  - name: Users
    description: User profile / settings
  - name: Admin - Decks
    description: Admin CRUD for decks
  - name: Admin - Lessons
    description: Admin CRUD for lessons
  - name: Admin - Vocabulary
    description: Admin CRUD for vocabulary

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Sokha Chan
                email:
                  type: string
                  format: email
                  example: sokha@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123
                hsk_level:
                  type: integer
                  minimum: 1
                  maximum: 2
                  default: 1
                language:
                  type: string
                  enum: [en, km]
                  default: km
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /lessons:
    get:
      tags: [Lessons]
      summary: Get all lessons for the logged-in user's HSK level
      responses:
        '200':
          description: List of lessons with unlock/completion status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LessonSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /lessons/{id}:
    get:
      tags: [Lessons]
      summary: Get a single lesson with its vocabulary
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '200':
          description: Lesson detail including vocabulary list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /lessons/{id}/complete:
    post:
      tags: [Lessons]
      summary: Mark a lesson complete, unlock the next one, push its vocabulary into SRS
      parameters:
        - $ref: '#/components/parameters/LessonId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                quiz_score:
                  type: integer
                  description: Number correct out of 4 auto-generated quiz questions
                  example: 3
      responses:
        '200':
          description: Lesson marked complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Lesson completed
                  unlocked_next_lesson_id:
                    type: integer
                    nullable: true
                  vocab_added_to_srs:
                    type: integer
                    example: 10
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocabulary/{id}:
    get:
      tags: [Vocabulary]
      summary: Get a single vocabulary word by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 42
      responses:
        '200':
          description: Vocabulary word
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vocabulary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /reviews/due:
    get:
      tags: [Reviews]
      summary: Get all cards due today for the logged-in user
      description: >
        Returns rows from review_sessions where next_review <= today,
        ordered by due date, joined with vocabulary content.
      responses:
        '200':
          description: Due review cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewCard'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reviews/rate:
    post:
      tags: [Reviews]
      summary: Rate a card and run the SM-2 algorithm
      description: >
        Applies SM-2 to compute new ease_factor, interval, and next_review
        for the given vocab_id, then upserts the review_sessions row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vocab_id, rating]
              properties:
                vocab_id:
                  type: integer
                  example: 42
                rating:
                  type: integer
                  description: 0=Again, 1=Hard, 3=Good, 5=Easy
                  enum: [0, 1, 3, 5]
                  example: 3
      responses:
        '200':
          description: Updated review session after applying SM-2
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Vocabulary not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /progress:
    get:
      tags: [Progress]
      summary: Get user stats — streak, retention rate, lessons/reviews completed
      responses:
        '200':
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/language:
    patch:
      tags: [Users]
      summary: Update the logged-in user's language preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language]
              properties:
                language:
                  type: string
                  enum: [en, km]
                  example: km
      responses:
        '200':
          description: Language updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/decks:
    get:
      tags: [Admin - Decks]
      summary: List all decks
      responses:
        '200':
          description: List of decks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deck'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin - Decks]
      summary: Create a deck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckInput'
      responses:
        '201':
          description: Deck created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/decks/{id}:
    put:
      tags: [Admin - Decks]
      summary: Update a deck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeckInput'
      responses:
        '200':
          description: Deck updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin - Decks]
      summary: Delete a deck (cascades to lessons and vocabulary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deck deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/lessons:
    post:
      tags: [Admin - Lessons]
      summary: Create a lesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonInput'
      responses:
        '201':
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonSummary'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/lessons/{id}:
    put:
      tags: [Admin - Lessons]
      summary: Update a lesson
      parameters:
        - $ref: '#/components/parameters/LessonId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonInput'
      responses:
        '200':
          description: Lesson updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin - Lessons]
      summary: Delete a lesson (cascades to vocabulary and user_lessons)
      parameters:
        - $ref: '#/components/parameters/LessonId'
      responses:
        '204':
          description: Lesson deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/vocabulary:
    post:
      tags: [Admin - Vocabulary]
      summary: Create a vocabulary word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocabularyInput'
      responses:
        '201':
          description: Vocabulary created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vocabulary'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/vocabulary/{id}:
    put:
      tags: [Admin - Vocabulary]
      summary: Update a vocabulary word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocabularyInput'
      responses:
        '200':
          description: Vocabulary updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vocabulary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin - Vocabulary]
      summary: Delete a vocabulary word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Vocabulary deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT returned from /auth/login or /auth/register. Send as
        `Authorization: Bearer <token>`. Admin-only routes additionally
        require the logged-in user's `role` field to equal `admin`.

  parameters:
    LessonId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 3

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not an admin
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: Invalid or expired token

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Sokha Chan
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, learner]
        hsk_level:
          type: integer
          example: 1
        language:
          type: string
          enum: [en, km]
        streak:
          type: integer
          example: 5
        last_active:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    Deck:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
          example: HSK 1 Core Vocabulary
        hsk_level:
          type: integer
          example: 1
        description:
          type: string
        created_at:
          type: string
          format: date-time

    DeckInput:
      type: object
      required: [title, hsk_level]
      properties:
        title:
          type: string
        hsk_level:
          type: integer
        description:
          type: string

    LessonSummary:
      type: object
      properties:
        id:
          type: integer
        deck_id:
          type: integer
        title:
          type: string
          example: Lesson 1 - Greetings
        lesson_number:
          type: integer
          example: 1
        is_unlocked:
          type: boolean
          description: Per-user unlock status (from user_lessons)
        is_completed:
          type: boolean
        word_count:
          type: integer
          example: 10

    LessonInput:
      type: object
      required: [deck_id, title, lesson_number]
      properties:
        deck_id:
          type: integer
        title:
          type: string
        lesson_number:
          type: integer
        is_unlocked_by_default:
          type: boolean
          default: false

    LessonDetail:
      allOf:
        - $ref: '#/components/schemas/LessonSummary'
        - type: object
          properties:
            vocabulary:
              type: array
              items:
                $ref: '#/components/schemas/Vocabulary'

    Vocabulary:
      type: object
      properties:
        id:
          type: integer
        deck_id:
          type: integer
        lesson_id:
          type: integer
        hanzi:
          type: string
          example: 爱
        pinyin:
          type: string
          example: ài
        part_of_speech:
          type: string
          example: verb
        definition_en:
          type: string
          example: to love
        definition_km:
          type: string
          example: ស្រឡាញ់
        example_cn:
          type: string
          example: 我爱我的家人。
        example_pinyin:
          type: string
          example: Wǒ ài wǒ de jiārén.
        example_en:
          type: string
          example: I love my family.
        example_km:
          type: string
          example: ខ្ញុំស្រឡាញ់គ្រួសាររបស់ខ្ញុំ។
        hsk_level:
          type: integer
          example: 1

    VocabularyInput:
      type: object
      required: [deck_id, lesson_id, hanzi, pinyin, definition_en, hsk_level]
      properties:
        deck_id:
          type: integer
        lesson_id:
          type: integer
        hanzi:
          type: string
        pinyin:
          type: string
        part_of_speech:
          type: string
        definition_en:
          type: string
        definition_km:
          type: string
        example_cn:
          type: string
        example_pinyin:
          type: string
        example_en:
          type: string
        example_km:
          type: string
        hsk_level:
          type: integer

    ReviewCard:
      type: object
      description: A due review session row joined with its vocabulary content
      properties:
        id:
          type: integer
          description: review_sessions.id
        vocab_id:
          type: integer
        ease_factor:
          type: number
          format: float
          example: 2.5
        interval:
          type: integer
          example: 6
        repetitions:
          type: integer
          example: 2
        next_review:
          type: string
          format: date
        vocabulary:
          $ref: '#/components/schemas/Vocabulary'

    ReviewSession:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        vocab_id:
          type: integer
        ease_factor:
          type: number
          format: float
          example: 2.6
        interval:
          type: integer
          description: Days until next review, recalculated by SM-2
          example: 6
        repetitions:
          type: integer
          example: 3
        next_review:
          type: string
          format: date
          example: '2026-07-08'
        last_rating:
          type: integer
          example: 3

    Progress:
      type: object
      properties:
        streak:
          type: integer
          example: 5
        lessons_completed:
          type: integer
          example: 8
        total_lessons:
          type: integer
          example: 15
        words_learned:
          type: integer
          example: 80
        reviews_due_today:
          type: integer
          example: 12
        retention_rate:
          type: number
          format: float
          description: Percentage of reviews rated Good/Easy over last 30 days
          example: 87.5